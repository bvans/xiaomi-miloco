services:
  robot-miloco:
    container_name: robot-miloco
    image: ${DOCKER_REPO:-}robot-miloco:latest
    ports:
      - ${BACKEND_PORT:-9999}:${BACKEND_PORT:-9999}
    environment:
      - BACKEND_HOST=${BACKEND_HOST:-0.0.0.0}
      - BACKEND_PORT=${BACKEND_PORT:-9999}
      - BACKEND_LOG_LEVEL=${BACKEND_LOG_LEVEL:-info}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-qwen3.7-plus}
      - SECRET_KEY=${SECRET_KEY:-change-me}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ./data:/app/miloco_server/.temp
      - ./log:/app/miloco_server/.temp/log
    restart: unless-stopped
    healthcheck:
      disable: true
